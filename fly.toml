# OpenClaw Fly.io Machines deployment configuration
# This config is for the machine image - machines are created dynamically per-instance
# See https://fly.io/docs/reference/configuration/

app = "openclaw-machines"
primary_region = "sin"

[build]
dockerfile = "Dockerfile"

[env]
NODE_ENV = "production"
OPENCLAW_PREFER_PNPM = "1"
OPENCLAW_STATE_DIR = "/data"
NODE_OPTIONS = "--max-old-space-size=1536"

# Note: [[mounts]] and [[vm]] only apply to `fly deploy`
# When creating Machines via API, configs are passed in the API call directly
# See apps/core/src/fly/machines.ts

# IMPORTANT: No [http_service] block
# We use Cloudflare Tunnel for routing, not Fly Proxy.
# Fly Proxy would see "zero traffic" and may unexpectedly suspend machines.
# Machine lifecycle is controlled entirely by ManagerDO + Alarm.

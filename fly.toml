# OpenClaw Fly.io Machines deployment configuration
# This config is for the machine image - machines are created dynamically per-instance
# See https://fly.io/docs/reference/configuration/

app = "openclaw-machines"
primary_region = "sin"

[build]
dockerfile = "Dockerfile"

[env]
NODE_ENV = "production"
OPENCLAW_PREFER_PNPM = "1"
OPENCLAW_STATE_DIR = "/data"
NODE_OPTIONS = "--max-old-space-size=1536"

# Note: [[mounts]] and [[vm]] only apply to `fly deploy`
# When creating Machines via API, configs are passed in the API call directly
# See apps/core/src/fly/machines.ts

# Fly Proxy routing via Fly-Force-Instance-Id header
# Machine lifecycle is controlled by ManagerDO (auto_stop/auto_start = false)
[http_service]
internal_port = 18789
force_https = true
auto_stop_machines = "off" # DO 手动管控
auto_start_machines = false # DO 手动管控
min_machines_running = 0

[http_service.concurrency]
type = "requests"
soft_limit = 25

# VM configuration for fly deploy
[[vm]]
memory = "2gb"
cpu_kind = "shared"
cpus = 1
